name: PR Validation

on:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Check file exists
        run: |
          if [ ! -f app.txt ]; then
            echo "app.txt not found ❌"
            exit 1
          fi

      - name: Success
        run: echo "All good ✅"
